<div *ngIf="list?.length" class="table-responsive">
  <table class="table table-striped">
    <thead>
      <tr>
        <th></th>
        <th>Título da enquete</th>
        <th>Data da disponibilização</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let item of list">
        <td>
          <ng-container *ngIf="item?.typeScheduleStatus === 0">
            <app-control-checkbox
              [value]="isChecked(item)"
              (changed)="listItemSelected.emit(item)"
            >
            </app-control-checkbox>
          </ng-container>
        </td>
        <td>{{ item.title || "-" }}</td>
        <td>{{ item.date || "-" }}</td>
        <td>{{ item.hasAnswered || "-" }}</td>
      </tr>
    </tbody>
  </table>
</div>

<h5 *ngIf="!list?.length" class="text-info">Nenhuma enquete encontrada</h5>
