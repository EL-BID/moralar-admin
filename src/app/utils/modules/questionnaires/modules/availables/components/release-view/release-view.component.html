<app-card>
  <h2 class="h5">Morador</h2>
  <h1>{{ release[0]?.familyHolderName }}</h1> </app-card
><br />

<div class="row">
  <div class="col-lg-12">
    <h2 class="h4">{{ release[0]?.title }}</h2>
  </div>
</div>
<app-card class="mb-3">
  <div class="row" *ngFor="let quest of release">
    <div class="col-lg-12">
      <h2 class="h5">{{ quest.question }}</h2>
    </div>
    <div class="col-lg-12">
      <span class="h5 text-danger">R: </span>
      <span>{{ quest?.answers }}</span>
    </div>
  </div>
</app-card>
