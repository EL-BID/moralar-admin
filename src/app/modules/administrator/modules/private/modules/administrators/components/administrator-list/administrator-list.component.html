<div class="table-responsive">
  <table class="table table-striped">
    <thead>
      <tr>
        <th sortable="name" (sort)="handleSort($event)">Nome</th>
        <th sortable="email" (sort)="handleSort($event)">E-mail</th>
        <th>Ações</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let item of list">
        <td>{{ item.name || "-" }}</td>
        <td>{{ item.email || "-" }}</td>
        <td>
          <div class="d-flex" *ngIf="item?.email != 'megaleios@megaleios.com'">
            <div class="custom-control custom-switch">
              <input
                type="checkbox"
                class="custom-control-input"
                [id]="'blocked-' + item.id"
                [value]="item.id"
                [checked]="item.blocked === false"
                (click)="handleBlockUnblock($event)"
              />
              <label [for]="'blocked-' + item.id" class="custom-control-label">
              </label>
            </div>
            <button [routerLink]="[item.id]" class="btn btn-primary ml-2">
              Detalhes
            </button>
          </div>
        </td>
      </tr>
    </tbody>
  </table>
</div>
