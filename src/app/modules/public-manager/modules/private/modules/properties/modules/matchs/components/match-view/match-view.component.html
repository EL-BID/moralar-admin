<app-card class="mb-3">
  <div class="table-responsive">
    <table class="table table-striped">
      <thead>
        <tr>
          <th>Priorização</th>
          <th>Número do cadastro</th>
          <th>Titular</th>
          <th>CPF</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let item of lista; let i = index">
          <td>{{ i + 1 }}</td>
          <td>{{ item.holder.number || "-" }}</td>
          <td>{{ item.holder.name || "-" }}</td>
          <td>{{ item.holder.cpf || "-" | mask: "000.000.000-00" }}</td>
          <td>
            <div class="box-options">
              <button
                *ngIf="item.typeStatusResidencial == 0"
                class="btn btn-info"
                (click)="handleDatailsFamily(item)"
              >
                Detalhes
              </button>
              <button
                *ngIf="item.typeStatusResidencial == 0 && openForSale === true"
                class="btn btn-outline-success"
                (click)="sellProperty(item.id)"
              >
                Vender
              </button>

              <button
                *ngIf="item?.familiIdResidencialChosen === item?.id"
                type="button"
                class="btn btn-success"
                (click)="handleDatailsFamily(item)"
              >
                Contemplado
              </button>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</app-card>

<ng-template #detailsFamily>
  <app-family-view [family]="family"></app-family-view>
</ng-template>
